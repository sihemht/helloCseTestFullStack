name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  tests:
    name: PHP ${{ matrix.php }} — Tests & Quality
    runs-on: ubuntu-latest

    strategy:
      matrix:
        php: [ '8.3' ]

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: ${{ secrets.MYSQL_ROOT_PASSWORD }}
          MYSQL_DATABASE: hello_cse_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: mbstring, pdo, pdo_mysql, exif, gd
          coverage: none
          tools: phpcs, phpstan

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: vendor
          key: composer-${{ hashFiles('composer.lock') }}
          restore-keys: composer-

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      # --- 🛡️ SECTION 1: SÉCURITÉ & QUALITÉ ---
      - name: Check Composer security vulnerabilities
        run: composer audit

      - name: Check Code Style (PSR-12)
        run: phpcs --standard=PSR12 app/ tests/

      # ----------------------------------------

      - name: Copy .env
        run: cp .env.example .env.testing

      - name: Set environment variables
        run: |
          echo "APP_KEY=" >> .env.testing
          echo "APP_ENV=testing" >> .env.testing
          echo "DB_CONNECTION=mysql" >> .env.testing
          echo "DB_HOST=127.0.0.1" >> .env.testing
          echo "DB_PORT=3306" >> .env.testing
          echo "DB_DATABASE=hello_cse_test" >> .env.testing
          echo "DB_USERNAME=root" >> .env.testing
          # Correction ici : Utilisation de la bonne syntaxe GitHub Actions pour injecter le secret
          echo "DB_PASSWORD=${{ secrets.MYSQL_ROOT_PASSWORD }}" >> .env.testing

      - name: Generate app key
        run: php artisan key:generate --env=testing

      - name: Run migrations
        run: php artisan migrate --env=testing --force

      - name: Run tests
        run: php artisan test --env=testing
